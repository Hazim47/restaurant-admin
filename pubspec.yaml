name: shawarma_admin
description: "A new Flutter project."
publish_to: 'none' # مشروع خاص، لا ينشر على pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^1.2.0
  sign_in_with_apple: ^6.0.0
  webview_flutter: ^4.2.1
  image_picker: ^1.1.1
  http: ^0.13.6
  shared_preferences: ^2.2.3
  audioplayers: ^5.2.1
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  intl: ^0.18.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/beep.mp3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"